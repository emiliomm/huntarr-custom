<!-- Global confirm modal (purple/blue style) - used for Profiles, Indexers, Clients, Root Folders, Custom Formats deletes -->
<div id="huntarr-confirm-modal" class="huntarr-confirm-modal" style="display: none;">
    <div class="huntarr-confirm-modal-backdrop" id="huntarr-confirm-modal-backdrop"></div>
    <div class="huntarr-confirm-modal-content">
        <div class="huntarr-confirm-modal-header">
            <button type="button" class="huntarr-confirm-modal-close" id="huntarr-confirm-modal-close"
                aria-label="Close">
                <i class="fas fa-times"></i>
            </button>
            <h2 class="huntarr-confirm-modal-title" id="huntarr-confirm-modal-title"></h2>
            <p class="huntarr-confirm-modal-message" id="huntarr-confirm-modal-message"></p>
        </div>
        <div class="huntarr-confirm-modal-input-wrap" id="huntarr-confirm-modal-input-wrap"
            style="display:none; padding: 0 24px 16px;">
            <label id="huntarr-confirm-modal-input-label"
                style="display:block; color:var(--ui-text-muted); font-size:13px; margin-bottom:6px;"></label>
            <input type="text" id="huntarr-confirm-modal-input"
                style="width:100%; padding:10px 14px; background:var(--ui-surface-raised); border:1px solid var(--ui-border-soft); border-radius:8px; color:var(--text-secondary); font-size:14px; box-sizing:border-box; outline:none; transition: border-color 0.2s;"
                onfocus="this.style.borderColor='var(--ui-accent-strong)'"
                onblur="this.style.borderColor='var(--ui-border-soft)'" />
        </div>
        <div class="huntarr-confirm-modal-actions">
            <button type="button" class="huntarr-confirm-modal-cancel" id="huntarr-confirm-modal-cancel">Cancel</button>
            <button type="button" class="huntarr-confirm-modal-extra" id="huntarr-confirm-modal-extra"
                style="display:none;"></button>
            <button type="button" class="huntarr-confirm-modal-confirm" id="huntarr-confirm-modal-confirm"></button>
        </div>
    </div>
</div>
