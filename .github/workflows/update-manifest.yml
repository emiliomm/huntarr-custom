name: Update Manifest

on:
  release:
    types: [published]
  workflow_dispatch: # Allow manual triggers

jobs:
  update-manifest:
    if: github.actor != 'huntarr-bot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      pull-requests: read
      issues: read

    steps:
      - name: Verify Secret Length
        run: |
          if [ -z "${{ secrets.SEMANTIC_RELEASE_BOT_PRIVATE_KEY }}" ]; then
            echo "Secret is EMPTY"
            exit 1
          else
            echo "Secret length: $(echo -n "${{ secrets.SEMANTIC_RELEASE_BOT_PRIVATE_KEY }}" | wc -c) characters"
          fi

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.SEMANTIC_RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.SEMANTIC_RELEASE_BOT_PRIVATE_KEY }}
        
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Get latest release
        id: latest_release
        run: |
          LATEST=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r '.tag_name // "v0.0.0"')
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest version: $LATEST"

      - name: Create manifest.json
        run: |
          cat > manifest.json << EOF
          {
            "version": "${{ steps.latest_release.outputs.version }}",
            "updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "project": {
              "name": "Huntarr",
              "description": "Automated media management for the masses",
              "repository": "${{ github.repository }}",
              "website": "https://plexguide.github.io/Huntarr.io"
            }
          }
          EOF

      - name: Validate JSON
        run: |
          if ! jq . manifest.json > /dev/null; then
            echo "ERROR: Generated manifest.json is not valid JSON"
            cat manifest.json
            exit 1
          fi
          echo "✅ manifest.json is valid"
          echo "Version: $(jq -r '.version' manifest.json)"

      - name: Commit and push changes
        run: |
          git config user.name "huntarr-bot[bot]"
          git config user.email "huntarr-bot[bot]@users.noreply.github.com"

          if ! git diff --exit-code manifest.json; then
            git add manifest.json
            git commit -m "Update manifest with latest version [skip ci]"         
            git push
            echo "✅ Manifest updated and pushed"
          else
            echo "ℹ️ No changes to manifest.json"
          fi 
