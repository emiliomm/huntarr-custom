name: Update Manifest

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  update-manifest:
    if: github.actor != 'huntarr-bot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      pull-requests: read
      issues: read

    steps:
      - name: Post-Release Step
        run: |
          echo "Release ${{ inputs.version }} is released"

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.SEMANTIC_RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.SEMANTIC_RELEASE_BOT_PRIVATE_KEY }}
        
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          # Explicitly check out the PR branch instead of the merge commit
          ref: ${{ github.head_ref }}

      - name: Get latest release
        id: latest_release
        uses: joutvhu/get-release@v1
        with:
          latest: true
          # Including pre-release
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest.json
        run: |
          cat > manifest.json << EOF
          {
            "version": "${{ inputs.version }}",
            "updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "project": {
              "name": "Huntarr",
              "description": "Automated media management for the masses",
              "repository": "${{ github.repository }}"
            }
          }
          EOF

      - name: Validate JSON
        run: |
          if ! jq . manifest.json > /dev/null; then
            echo "ERROR: Generated manifest.json is not valid JSON"
            cat manifest.json
            exit 1
          fi
          echo "Manifest.json is valid"
          echo "Version: $(jq -r '.version' manifest.json)"

      - name: Create version.txt
        run: |
          cat > version.txt << EOF
          ${{ inputs.version }}
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "huntarr-bot[bot]"
          git config user.email "huntarr-bot[bot]@users.noreply.github.com"

          # Get the version from the version in the REPOSITORY (HEAD)
          # We use git show to see the file as it exists BEFORE our local changes
          REPO_VERSION=$(git show HEAD:manifest.json | jq -r '.version')
          NEW_VERSION="${{ inputs.version }}"

          echo "Repo version: $REPO_VERSION"
          echo "New version:  $NEW_VERSION"

          if [ "$REPO_VERSION" == "$NEW_VERSION" ]; then
            echo "Version $NEW_VERSION is already pushed to the repo. Skipping commit to prevent loop."
            exit 0
          fi

          git add manifest.json
          git add version.txt
          git commit -m "Update manifest to ${{ inputs.version }}"
          # Be explicit about where you are pushing
          git push origin HEAD:${{ github.head_ref }}
          echo "Manifest updated and pushed"
